name: CI

# Jaga 4 inovasi inti + keamanan dari regresi: lint & test otomatis tiap
# push/PR ke main. Test self-contained (LLM/Docker/Ollama selalu di-mock,
# CLAUDE.md §5), jadi tidak butuh layanan eksternal di runner.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Batalkan run lama bila ada push baru di ref yang sama (hemat menit CI).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # uv + lockfile: build reproducible. --frozen GAGAL bila uv.lock tak sinkron
      # dengan pyproject.toml → memaksa kontributor commit lock yang konsisten.
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies (locked)
        run: uv sync --frozen --extra dev

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Ruff lint
        run: uv run ruff check .

      - name: Pytest
        run: uv run pytest -q
