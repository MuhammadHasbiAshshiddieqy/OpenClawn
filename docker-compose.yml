version: "3.9"

services:
  openclawn:
    build:
      context: .
      dockerfile: Dockerfile.role
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    environment:
      - OPENCLAWN_ROLE=pm
    restart: unless-stopped
    # §P0 production-readiness: dependency-aware startup/monitoring (bukan cuma
    # restart policy). Pakai stdlib urllib (bukan curl — python:3.12-slim tak
    # menyertakannya, hindari menambah paket demi healthcheck).
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Sandbox image di-build terpisah — tidak dijalankan sebagai service,
  # hanya dipakai oleh DockerSandbox.run_python() via docker run
  # Build: docker build -t openclawn-sandbox:latest -f Dockerfile.sandbox .
